<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>finding-boxes fixture</title>
  <style>
    body { font: 16px system-ui; margin: 0; padding: 0; background: #0f1115; color: #e6e6e6; }
    header { padding: 16px 24px; background: #171a21; font-weight: 700; }
    main { padding: 24px; }
    .card { max-width: 480px; border: 1px solid #2a2e37; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    /* an INTERACTIVE control shoved far past its container and clipped off-screen
       by an overflow:hidden frame with no scroll path -> genuinely unreachable
       (the overflow oracle's ground-truth break). */
    .spiller { width: 1400px; height: 40px; background: #5a2030; border-radius: 6px; border: 0; color: #fff; }
    button { margin-right: 10px; padding: 10px 18px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; }
  </style>
</head>
<body>
  <header id="site-header">Acme</header>
  <main>
    <div class="card" style="overflow:hidden">
      <p>Order summary</p>
      <div style="position:relative">
        <button id="spiller" class="spiller">overflowing bar</button>
      </div>
    </div>
    <div class="card">
      <!-- a stringify bug leaked to the screen -->
      <div id="greeting">Welcome back, [object Object]</div>
    </div>
    <div class="card">
      <button id="safe">Edit</button>
      <button id="boom" onclick="(function(){ const o = null; return o.x; })()">Submit</button>
    </div>
    <div class="card">
      <!-- broken-route boxing: a same-page fragment link (must never match a
           dead route), a glyphless image-overlay anchor, and a block-level
           text link much wider than its rendered text. -->
      <a id="skip" href="#site-header">Skip to Content</a>
      <a id="overlay" href="/dead-image" style="display:block;width:320px;height:120px;position:relative">
        <img alt="Course tile" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" style="width:100%;height:100%">
      </a>
      <a id="blocklink" href="/dead-text" style="display:block;width:600px">tiny</a>
    </div>
  </main>
</body>
</html>
