openapi: 3.1.0
info:
  title: Reproit backend CLI gate
  version: 1.0.0
paths:
  /messages:
    post:
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: string }
