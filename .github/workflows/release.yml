name: release

# Fully automatic release on every push to main, no PAT required: one workflow
# run tags the next patch (highest vX.Y.* + 1), builds the cross-platform
# binaries, publishes the GitHub release, and bumps the Homebrew tap. The build
# jobs `needs` the tag job, so nothing relies on a tag-push re-triggering another
# workflow (which the default GITHUB_TOKEN cannot do). Only a tag is pushed,
# never a commit to main, so this never loops. The version itself comes from
# `git describe` in build.rs, so the binary is stamped with the tag.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags so the release counter is correct

      - id: t
        run: |
          set -euo pipefail
          MM=$(grep -m1 '^version = ' crates/reproit/Cargo.toml | sed -E 's/version = "([0-9]+\.[0-9]+)\..*/\1/')
          LAST=$(git tag -l "v${MM}.*" --sort=-v:refname | head -1)
          PATCH="${LAST##*.}"
          VER="${MM}.$(( ${PATCH:--1} + 1 ))"
          NEXT="v${VER}"
          # Skip if HEAD is already released (the last tag points at HEAD), so a
          # re-run or a no-op push does not cut a duplicate release.
          if [ -n "$LAST" ] && [ "$(git rev-list -n1 "$LAST")" = "$(git rev-parse HEAD)" ]; then
            echo "HEAD already released as $LAST; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Bake the release version into the crate so an INSTALLED binary reports
          # it even where `git describe` can't see tags (cargo install from git or
          # crates.io, where build.rs falls back to CARGO_PKG_VERSION = the
          # Cargo.toml version). The lockfile's own reproit entry is bumped too so
          # `cargo build --locked` still matches. This commit goes to main with the
          # default GITHUB_TOKEN, whose pushes do NOT trigger workflows, so there
          # is no release loop. The tag points at this commit, so release binaries
          # and source installs report the same version.
          # perl (portable across the GNU/BSD split, unlike `sed -i`): set the
          # first `version =` in the crate manifest, and the `version =` line that
          # immediately follows `name = "reproit"` in the lockfile.
          VER="$VER" perl -i -pe 'if (!$d && s/^version = .*/version = "$ENV{VER}"/) { $d=1 }' crates/reproit/Cargo.toml
          VER="$VER" perl -i -pe 's/^version = "[0-9.]+"/version = "$ENV{VER}"/ if $p eq qq{name = "reproit"\n}; $p=$_' Cargo.lock
          git add crates/reproit/Cargo.toml Cargo.lock
          git commit -m "release v${VER}"
          git push origin HEAD:main
          git tag -a "$NEXT" -m "$NEXT"
          git push origin "$NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

  build:
    needs: tag
    if: needs.tag.outputs.tag != ''
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # Cross-compiled on the arm64 runner (the macOS SDK is universal), so
          # we don't depend on the deprecated/queue-starved Intel macos-13 pool.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}
          fetch-depth: 0 # so build.rs (git describe) stamps the tag version

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build reproit (release)
        run: cargo build --release --locked -p reproit --target ${{ matrix.target }}

      # Cross-platform via bash (Git Bash on the Windows runner). macOS/Linux ship
      # a .tar.gz (what the Homebrew formula installs); Windows ships a .zip with
      # reproit.exe (what Scoop/winget install).
      - name: Package
        shell: bash
        env:
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          T="${{ matrix.target }}"
          ARCHIVE="reproit-${TAG}-${T}"
          cd "target/${T}/release"
          if [[ "$T" == *windows* ]]; then
            7z a "../../../${ARCHIVE}.zip" reproit.exe >/dev/null
          else
            strip reproit || true
            tar -czf "../../../${ARCHIVE}.tar.gz" reproit
          fi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: reproit-${{ needs.tag.outputs.tag }}-${{ matrix.target }}.*

  # Build the web runner bundle (runner.mjs + helpers + production node_modules)
  # and attach it as a single platform-agnostic tarball. The reproit binary's
  # self-heal (config::ensure_web_runner_dir) and install.sh both download this
  # from the release, so `reproit fuzz <url>` needs no `npm install` and no
  # `REPROIT_WEB_RUNNER_DIR`. The headless browser is NOT bundled (it is fetched
  # once via `playwright install chromium` at install / first run, like every
  # browser-automation tool), which keeps this asset to a few MB.
  web-runner:
    needs: tag
    if: needs.tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build runner bundle
        run: |
          set -euo pipefail
          cd runners/web
          # Production deps only; pure JS, so the bundle is platform-agnostic.
          # `npm ci` from the committed lockfile pins the exact versions, so the
          # shipped runner bundle never floats Playwright between releases.
          npm ci --omit=dev --no-audit --no-fund
          # Tar the runner CONTENTS (so it extracts flat into <data>/reproit/web),
          # dropping tests/fixtures that the runtime never loads.
          tar --exclude='*.test.mjs' --exclude='*-fixture.html' \
            -czf "$GITHUB_WORKSPACE/reproit-web-runner.tar.gz" .
          # Publish the SHA-256 alongside the tarball so the binary's self-heal
          # (config::download_and_extract_runner) can verify the bundle it
          # downloads before executing it. Format: "<hex>  <filename>", the
          # standard shasum/sha256sum layout the CLI parses.
          cd "$GITHUB_WORKSPACE"
          shasum -a 256 reproit-web-runner.tar.gz > reproit-web-runner.tar.gz.sha256

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            reproit-web-runner.tar.gz
            reproit-web-runner.tar.gz.sha256

  # Regenerate the Homebrew formula with the real sha256s and push it to the tap
  # (github.com/ReproIt/homebrew-tap), so `brew install ReproIt/tap/reproit` tracks
  # each release with no manual editing. Requires a HOMEBREW_TAP_DEPLOY_KEY secret:
  # the PRIVATE half of a write deploy key on the homebrew-tap repo. Skips itself
  # if the secret isn't set, so releases never fail on its account.
  update-homebrew-tap:
    needs: [tag, build]
    if: needs.tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap deploy key
        id: gate
        run: echo "have=${{ secrets.HOMEBREW_TAP_DEPLOY_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 of each release asset
        if: steps.gate.outputs.have == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          for t in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            f="reproit-${TAG}-${t}.tar.gz"
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$f" --dir .
          done
          echo "SHA_ARM_MAC=$(shasum -a 256 reproit-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_INTEL_MAC=$(shasum -a 256 reproit-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_LINUX=$(shasum -a 256 reproit-${TAG}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Render formula and push to tap
        if: steps.gate.outputs.have == 'true'
        env:
          TAG: ${{ needs.tag.outputs.tag }}
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:ReproIt/homebrew-tap.git tap
          mkdir -p tap/Formula
          cat > tap/Formula/reproit.rb <<EOF
          # Auto-generated by the ReproIt/reproit release workflow. Do not edit by hand.
          class Reproit < Formula
            desc "Deterministic UI fuzzer: find a bug once, reproduce it forever"
            homepage "https://reproit.com"
            version "${VERSION}"
            license "Elastic-2.0"

            on_macos do
              on_arm do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
              on_intel do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL_MAC}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "reproit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/reproit --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/reproit.rb
          git commit -m "reproit ${TAG}" || { echo "no formula change"; exit 0; }
          git push
