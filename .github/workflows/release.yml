name: release

# Build prebuilt `reproit` CLI binaries for macOS (arm64 + x86_64) and Linux
# x86_64 on every pushed v* tag, then attach the tarballs to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # Cross-compiled on the arm64 runner (the macOS SDK is universal), so
          # we don't depend on the deprecated/queue-starved Intel macos-13 pool.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build reproit (release)
        run: cargo build --release --locked -p reproit --target ${{ matrix.target }}

      # Cross-platform via bash (Git Bash on the Windows runner). macOS/Linux ship
      # a .tar.gz (what the Homebrew formula installs); Windows ships a .zip with
      # reproit.exe (what Scoop/winget install).
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          T="${{ matrix.target }}"
          ARCHIVE="reproit-${{ github.ref_name }}-${T}"
          cd "target/${T}/release"
          if [[ "$T" == *windows* ]]; then
            7z a "../../../${ARCHIVE}.zip" reproit.exe >/dev/null
          else
            strip reproit || true
            tar -czf "../../../${ARCHIVE}.tar.gz" reproit
          fi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: reproit-${{ github.ref_name }}-${{ matrix.target }}.*

  # Regenerate the Homebrew formula with the real sha256s and push it to the tap
  # (github.com/ReproIt/homebrew-tap), so `brew install ReproIt/tap/reproit` tracks
  # each release with no manual editing. Requires a HOMEBREW_TAP_DEPLOY_KEY secret:
  # the PRIVATE half of a write deploy key on the homebrew-tap repo (never expires,
  # scoped to that one repo). Skips itself if the secret isn't set, so releases
  # never fail on its account.
  update-homebrew-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap deploy key
        id: gate
        run: echo "have=${{ secrets.HOMEBREW_TAP_DEPLOY_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 of each release asset
        if: steps.gate.outputs.have == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for t in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            f="reproit-${TAG}-${t}.tar.gz"
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$f" --dir .
          done
          echo "SHA_ARM_MAC=$(shasum -a 256 reproit-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_INTEL_MAC=$(shasum -a 256 reproit-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_LINUX=$(shasum -a 256 reproit-${TAG}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Render formula and push to tap
        if: steps.gate.outputs.have == 'true'
        env:
          TAG: ${{ github.ref_name }}
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Authenticate to the tap over SSH with the deploy key.
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:ReproIt/homebrew-tap.git tap
          mkdir -p tap/Formula
          cat > tap/Formula/reproit.rb <<EOF
          # Auto-generated by the ReproIt/reproit release workflow. Do not edit by hand.
          class Reproit < Formula
            desc "Deterministic UI fuzzer: find a bug once, reproduce it forever"
            homepage "https://reproit.com"
            version "${VERSION}"
            license "Elastic-2.0"

            on_macos do
              on_arm do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
              on_intel do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL_MAC}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/ReproIt/reproit/releases/download/${TAG}/reproit-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "reproit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/reproit --version")
            end
          end
          EOF
          cd tap
          git config user.name "reproit-release-bot"
          git config user.email "release@reproit.com"
          git add Formula/reproit.rb
          git commit -m "reproit ${TAG}" || { echo "no formula change"; exit 0; }
          git push
