name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without the v prefix
        required: true
        default: 1.0.0
      publish:
        description: Publish the validated artifacts as a GitHub release
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          PUBLISH: ${{ inputs.publish }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${REQUESTED_VERSION#v}"
          TAG="v${VERSION}"
          MANIFEST_VERSION=$(
            sed -n 's/^version = "\([0-9][0-9.]*\)"/\1/p' \
              crates/reproit/Cargo.toml | head -1
          )
          test "$VERSION" = "$MANIFEST_VERSION" || {
            echo "requested $VERSION but crates/reproit/Cargo.toml contains $MANIFEST_VERSION" >&2
            exit 1
          }
          sh validation/release/check-version-contract.sh "$VERSION"
          if [[ "$PUBLISH" == "true" ]]; then
            git rev-parse "$TAG" >/dev/null 2>&1 && {
              echo "$TAG already exists" >&2
              exit 1
            }
            gh release view "$TAG" >/dev/null 2>&1 && {
              echo "release $TAG already exists" >&2
              exit 1
            }
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Require successful CI and native evidence for publication
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          require_success() {
            workflow=$1
            endpoint="repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs"
            run_id=$(
              gh api \
                "${endpoint}?head_sha=${GITHUB_SHA}&status=completed&per_page=20" \
                --jq '.workflow_runs | map(select(.conclusion == "success")) | first | .id // empty'
            )
            test -n "$run_id" || {
              echo "no successful ${workflow} run exists for ${GITHUB_SHA}" >&2
              exit 1
            }
            echo "${workflow}: successful run ${run_id}"
          }
          require_success ci.yml

  native-evidence:
    if: inputs.publish
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download exact-commit release-tier native evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p native/macos
          endpoint="repos/${GITHUB_REPOSITORY}/actions/workflows/native-gates.yml/runs"
          selected_run=""
          mapfile -t run_ids < <(
            gh api \
              "${endpoint}?head_sha=${GITHUB_SHA}&status=completed&per_page=20" \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .id'
          )
          for run_id in "${run_ids[@]}"; do
            if gh run download "$run_id" --name native-gates-macos-ax \
              --dir native/macos 2>/dev/null; then
              echo "macOS AX evidence: native-gates run $run_id"
              selected_run="$run_id"
              break
            fi
          done
          test -n "$selected_run" || {
            echo "no successful exact-commit native-gates run contains macOS AX evidence" >&2
            exit 1
          }
          gh run download "$selected_run" --name native-gates-linux-hosted \
            --dir native/linux-hosted
          gh run download "$selected_run" --name native-gates-android \
            --dir native/android
          gh run download "$selected_run" --name native-gates-macos-flutter \
            --dir native/macos-flutter
      - name: Download private Windows UIA evidence bundle
        env:
          WINDOWS_UIA_EVIDENCE_URL: ${{ secrets.WINDOWS_UIA_EVIDENCE_URL }}
        run: |
          set -euo pipefail
          test -n "$WINDOWS_UIA_EVIDENCE_URL" || {
            echo "WINDOWS_UIA_EVIDENCE_URL is not configured" >&2
            exit 1
          }
          mkdir -p native/windows
          curl --fail --silent --show-error --location \
            "$WINDOWS_UIA_EVIDENCE_URL" --output native/windows.zip
          python3 -m zipfile --test native/windows.zip
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          archive = Path("native/windows.zip")
          destination = Path("native/windows")
          expected = {"windows-uia.json", "windows-uia.log"}
          with ZipFile(archive) as source:
              names = set(source.namelist())
              if names != expected:
                  raise SystemExit(f"unexpected Windows evidence members: {sorted(names)}")
              for name in sorted(expected):
                  target = destination / name
                  target.write_bytes(source.read(name))
          PY
      - name: Validate release-tier captured logs and result manifests
        run: |
          python3 validation/release/check-native-evidence.py \
            --commit "$GITHUB_SHA" \
            --linux-hosted-dir native/linux-hosted \
            --android-dir native/android \
            --flutter-dir native/macos-flutter \
            --macos-dir native/macos \
            --windows-dir native/windows \
            --out reproit-native-evidence.json
      - uses: actions/upload-artifact@v7
        with:
          name: reproit-native-evidence
          path: reproit-native-evidence.json
          if-no-files-found: error

  build:
    needs: validate
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          # Build against an older glibc baseline so the archive runs on current
          # and still-supported Linux distributions, not only the newest image.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Stamp the release tag locally
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
        # This tag exists only inside the isolated build checkout. Force lets a
        # non-publishing dry run validate a version whose historical tag still
        # exists; publish-mode validation rejects such a tag before this job.
        run: git tag -f "$TAG" "$GITHUB_SHA"
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
      - name: Install AT-SPI development library
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libatspi2.0-dev
      - uses: Swatinem/rust-cache@v2
        with:
          # The OS image is part of the key because aws-lc contains native C
          # objects. Reusing an Ubuntu 24 cache on Ubuntu 22 links references to
          # newer glibc symbols and defeats the compatibility build.
          key: release-${{ matrix.os }}-${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked -p reproit --target ${{ matrix.target }}
      - name: Package
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ARCHIVE="reproit-${TAG}-${TARGET}"
          cd "target/${TARGET}/release"
          if [[ "$TARGET" == *windows* ]]; then
            7z a "../../../${ARCHIVE}.zip" reproit.exe >/dev/null
            FILE="${ARCHIVE}.zip"
          else
            tar -czf "../../../${ARCHIVE}.tar.gz" reproit
            FILE="${ARCHIVE}.tar.gz"
          fi
          cd "$GITHUB_WORKSPACE"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$FILE" > "$FILE.sha256"
          else
            shasum -a 256 "$FILE" > "$FILE.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: reproit-${{ matrix.target }}
          path: |
            reproit-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.tar.gz
            reproit-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.tar.gz.sha256
            reproit-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.zip
            reproit-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  web-runner:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Package the pinned web runner
        run: |
          set -euo pipefail
          cd runners/web
          npm ci --omit=dev --no-audit --no-fund
          tar --exclude='*.test.mjs' --exclude='*-fixture.html' \
            -czf "$GITHUB_WORKSPACE/reproit-web-runner.tar.gz" .
          cd "$GITHUB_WORKSPACE"
          sha256sum reproit-web-runner.tar.gz > reproit-web-runner.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: reproit-web-runner
          path: |
            reproit-web-runner.tar.gz
            reproit-web-runner.tar.gz.sha256

  production-loop:
    if: inputs.publish
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust and the browser runner
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          npm ci --prefix runners/web
          npx --prefix runners/web playwright install --with-deps chromium
      - name: Build the release-candidate CLI
        run: cargo build --locked -p reproit
      - name: Run the strict hosted protocol-to-local-replay gate
        env:
          REPROIT_CLOUD_ACCOUNT_KEY: ${{ secrets.REPROIT_CLOUD_ACCOUNT_KEY }}
          REPROIT_CONTRACT_RESULTS: ${{ runner.temp }}/production-loop.json
        run: validation/cloud/run-production-loop.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: production-loop
          path: ${{ runner.temp }}/production-loop.json
          if-no-files-found: error

  install-smoke:
    needs: [validate, build, web-runner]
    name: install smoke ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            shell: sh
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            shell: sh
          - os: macos-14
            target: aarch64-apple-darwin
            shell: sh
          - os: macos-15-intel
            target: x86_64-apple-darwin
            shell: sh
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            shell: pwsh
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            shell: pwsh
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Serve release candidate assets
        shell: bash
        run: |
          python -m http.server 18780 --bind 127.0.0.1 --directory dist \
            > "$RUNNER_TEMP/reproit-assets.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/reproit-assets.pid"
          for _ in {1..50}; do
            curl -fsS http://127.0.0.1:18780/ >/dev/null && exit 0
            sleep .1
          done
          cat "$RUNNER_TEMP/reproit-assets.log"
          exit 1
      - name: Install into a clean Unix home
        if: matrix.shell == 'sh'
        shell: bash
        env:
          REPROIT_VERSION: ${{ needs.validate.outputs.tag }}
          REPROIT_RELEASE_BASE: http://127.0.0.1:18780
          REPROIT_SKIP_BROWSER_INSTALL: "1"
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/reproit-home"
          export REPROIT_BIN_DIR="$HOME/bin"
          mkdir -p "$HOME"
          sh install.sh
          test "$("$REPROIT_BIN_DIR/reproit" --version)" = \
            "reproit ${REPROIT_VERSION#v}"
          "$REPROIT_BIN_DIR/reproit" --help | grep -q 'reproit scan'
          test -f "$HOME/.local/share/reproit/web/package.json" \
            || test -f "$HOME/Library/Application Support/reproit/web/package.json"
      - name: Install into a clean Windows profile
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          REPROIT_VERSION: ${{ needs.validate.outputs.tag }}
          REPROIT_RELEASE_BASE: http://127.0.0.1:18780
          REPROIT_SKIP_BROWSER_INSTALL: "1"
        run: |
          $env:LOCALAPPDATA = Join-Path $env:RUNNER_TEMP 'reproit-localappdata'
          $env:REPROIT_BIN_DIR = Join-Path $env:RUNNER_TEMP 'reproit-bin'
          New-Item -ItemType Directory -Force -Path $env:LOCALAPPDATA | Out-Null
          & ./install.ps1
          $installed = Join-Path $env:REPROIT_BIN_DIR 'reproit.exe'
          $version = (& $installed --version) -join "`n"
          $expected = 'reproit ' + $env:REPROIT_VERSION.TrimStart('v')
          if ($version.Trim() -ne $expected) { throw "installed $version, expected $expected" }
          $help = (& $installed --help) -join "`n"
          if ($help -notmatch 'reproit scan') { throw 'installed CLI help is incomplete' }
          if (-not (Test-Path (Join-Path $env:LOCALAPPDATA 'reproit\web\package.json'))) {
            throw 'web runner bundle was not installed'
          }

  publish:
    if: inputs.publish
    needs: [validate, build, web-runner, install-smoke, production-loop, native-evidence]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: reproit-*
          merge-multiple: true
      - name: Verify the release payload
        run: |
          set -euo pipefail
          test -s dist/reproit-native-evidence.json
          find dist -maxdepth 1 -type f -printf '%f\n' | sort
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 15
      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "ReproIt ${TAG#v}" \
            --generate-notes \
            --latest
      - name: Move the stable major Action tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          test "${TAG%%.*}" = "v1" || {
            echo "refusing to move v1 for non-v1 release $TAG" >&2
            exit 1
          }
          git init stable-tag
          cd stable-tag
          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git tag -f v1 FETCH_HEAD
          git push origin refs/tags/v1 --force
