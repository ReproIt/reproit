name: native-backend-gates

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:
    inputs:
      run_macos_ax:
        description: "Run the macOS AX gate on a runner with accessibility permission"
        required: false
        default: false
        type: boolean
      run_flutter_ios:
        description: "Run the generated Flutter application on an iOS simulator"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  linux-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Rust and native libraries
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          sudo apt-get update
          sudo apt-get install -y libatspi2.0-dev clang xvfb
      - name: Install browser runner and engines
        working-directory: runners/web
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox webkit
      - name: Run hosted Linux native gates
        env:
          REPROIT_GATE_OUTPUT_DIR: ${{ runner.temp }}/native-gates
        run: |
          python3 validation/backends/gate.py web-chromium
          python3 validation/backends/gate.py web-engines
          xvfb-run -a python3 validation/backends/gate.py electron
          python3 validation/backends/gate.py tui-pty
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-linux-hosted
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error

  linux-containers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Run disposable Linux container gates
        env:
          REPROIT_GATE_OUTPUT_DIR: ${{ runner.temp }}/native-gates
        run: |
          python3 validation/backends/gate.py tauri
          python3 validation/backends/gate.py linux-atspi-gtk
          python3 validation/backends/gate.py linux-atspi-toolkits
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-linux-containers
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error

  android-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Appium and runner dependencies
        run: |
          npm ci --prefix runners/rn
          npm install -g appium
          appium driver install uiautomator2
      - name: Enable KVM
        run: |
          rule='KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"'
          printf '%s\n' "$rule" | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android native gates
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          disable-animations: true
          emulator-boot-timeout: 900
          script: bash .github/scripts/run-android-native-gates.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-android
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error

  macos-swiftui:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install SwiftUI runner dependencies
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          npm ci --prefix runners/rn
          npm install -g appium
          appium driver install xcuitest
      - name: Run SwiftUI through Appium
        env:
          REPROIT_GATE_OUTPUT_DIR: ${{ runner.temp }}/native-gates
        run: bash .github/scripts/run-swiftui-native-gate.sh
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-macos-swiftui
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error

  macos-flutter:
    if: github.event_name == 'schedule' || inputs.run_flutter_ios
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Flutter on a disposable simulator
        env:
          REPROIT_GATE_OUTPUT_DIR: ${{ runner.temp }}/native-gates
        run: python3 validation/backends/gate.py flutter-ios
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-macos-flutter
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error

  macos-ax:
    if: github.event_name == 'workflow_dispatch' && inputs.run_macos_ax
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Run macOS AX with explicit permission
        env:
          REPROIT_GATE_OUTPUT_DIR: ${{ runner.temp }}/native-gates
        run: python3 validation/backends/gate.py macos-ax
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: native-gates-macos-ax
          path: ${{ runner.temp }}/native-gates
          if-no-files-found: error
