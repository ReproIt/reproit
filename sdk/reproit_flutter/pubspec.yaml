name: reproit_flutter
description: ReproIt production telemetry SDK for Flutter. Emits the same state-graph and error events from real users as the reproit test runners, so a prod "cannot reproduce" becomes a deterministic replay.
version: 0.1.0
publish_to: none
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  crypto: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
