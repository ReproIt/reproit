<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f7; color: #1c1c1e; }
    header { padding: 1rem 1.25rem; background: #fff; border-bottom: 1px solid #e2e2e6; }
    header h1 { margin: 0; font-size: 1.15rem; }
    main { max-width: 30rem; margin: 0 auto; padding: 1rem 1.25rem; }

    /* Delegated-click rows. Note: these are <div role="option" tabindex="-1">,
       NOT <button>. They carry cursor:pointer so a pointer user can clearly
       operate them; there is NO native interactive element anywhere in the app.
       A single document-level click listener (see app.js) drives every one. */
    .row {
      cursor: pointer;
      background: #fff;
      border: 1px solid #e2e2e6;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin: 0.5rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .row:hover { background: #fafafa; }
    .row .chevron { color: #b0b0b5; }

    /* An icon-only control: decorative glyph, aria-hidden, no text/label.
       This is the seeded operability (unlabeled-tappable) bug. */
    .iconbtn {
      cursor: pointer;
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: #ececf0;
      user-select: none;
    }
    /* The glyph is painted via a CSS pseudo-element, so it is NOT a DOM text
       node: the control has no text content and no aria-label -> no accessible
       name (the seeded operability bug). */
    .iconbtn::before { content: "\266B"; font-size: 1.1rem; line-height: 1; }

    .back {
      cursor: pointer;
      display: inline-block;
      color: #0a84ff;
      margin-bottom: 0.75rem;
      user-select: none;
    }
    .muted { color: #6e6e73; font-size: 0.9rem; }
    .danger { color: #ff3b30; }
    h2 { font-size: 1rem; margin: 1.25rem 0 0.25rem; }
  </style>
</head>
<body>
  <header><h1 id="title">Settings</h1></header>
  <main id="view" aria-label="Settings"></main>
  <script src="./app.js"></script>
</body>
</html>
