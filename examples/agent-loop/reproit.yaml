# reproit config for the agent-verification-loop demo.
#
# The web (Playwright/Chromium) backend drives the static fixture in app/.
# map -> fuzz -> check all share this config, so a fuzz finding's id can be
# replayed by `check <id>` later (zero-config `fuzz <url>` does not persist a
# config, so a follow-up `check` could not resolve the app; an explicit config
# fixes that for the loop).
app:
  platform: web-playwright
  # Holds runner.mjs. Defaults to the repo's runners/web; override with the env var.
  webRunnerDir: ${REPROIT_WEB_RUNNER_DIR:-../../runners/web}
  # The locally served fixture. The harness starts `python3 -m http.server` here.
  url: ${APP_URL:-http://localhost:8731}

devices:
  namePrefix: AgentLoop

journeys:
  driver: ""                       # unused by the web backend; required by schema
  doneMarkers: ["All tests passed"]

# Replay the repro a few times on `check` to make the verdict robust.
gate:
  runs: 1
