<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    main { max-width: 24rem; }
    .count { font-size: 2rem; margin: 1rem 0; }
    button { font-size: 1rem; padding: 0.5rem 1rem; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <main aria-label="Counter app">
    <h1>Counter</h1>
    <p class="count" role="status" aria-live="polite">Count: <span id="value">0</span></p>
    <button id="inc" type="button">Increment</button>
    <button id="dec" type="button">Decrement</button>
    <button id="reset" type="button">Reset</button>
  </main>
  <script src="./app.js"></script>
</body>
</html>
