<!doctype html>
<html lang="en">
  <head>

    <title>Reproit Tauri Fixture</title>
  </head>
  <body>
    <button data-testid="toggle" type="button">Toggle</button>
    <section data-testid="detail" hidden>Detail revealed</section>
    <section id="bounded-card" data-reproit-contain style="width:80px">
      <span id="overflow-message" style="white-space:nowrap">Overflow proof fixture</span>

      });
    </script>
  </body>
</html>
