# React Native over an Appium session; the a11y tree is the state.
app:
  platform: rn-appium
  rnRunnerDir: ${REPROIT_RN_RUNNER_DIR:-./rn-runner}
  appiumUrl: ${APPIUM_URL:-http://127.0.0.1:4723}
  appiumCaps:
    platformName: Android
    "appium:automationName": UiAutomator2
    "appium:app": ${APP_PATH:-./app/build/outputs/apk/debug/app-debug.apk}
devices:
  namePrefix: Example
journeys:
  driver: ""
  doneMarkers: ["All tests passed"]
